name: 'Docs'

on:
  workflow_dispatch:
  push:
    branches: ['master']

jobs:
  docs:
    name: 'Docs'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.zensical.outputs.page_url }}

    steps:
      - name: 'Zensical Action'
        id: zensical
        uses: cssnr/zensical-action@v1
