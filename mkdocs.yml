site_name: "Eric Zimmerman's Tools"
site_description: "Eric Zimmerman's Tools"
site_author: 'Eric Zimmerman'
docs_dir: docs/
repo_name: 'EricZimmerman/ericzimmerman.github.io'
repo_url: 'https://github.com/EricZimmerman/ericzimmerman.github.io'
nav:
    - Home: index.md
    - Documentation: documentation.md
    - How to build self-contained exes: selfcontained.md
    - Benchmarks: benchmarks.md
    - ChangeLog: 'https://download.mikestammer.com/ChangeLog.txt'
theme:
  features:
    - navigation.tabs
  name: 'material'
  color_mode: auto
  user_color_mode_toggle: true
  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
